<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contractor Hours — Review · MRDC Safety</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzMiAzMic+PHJlY3Qgd2lkdGg9JzMyJyBoZWlnaHQ9JzMyJyByeD0nNicgZmlsbD0nIzFCNEY4QScvPjx0ZXh0IHg9JzE2JyB5PScyMicgZm9udC1mYW1pbHk9J0dlb3JnaWEsc2VyaWYnIGZvbnQtc2l6ZT0nMTYnIGZvbnQtd2VpZ2h0PSdib2xkJyBmaWxsPScjRTg3NzJFJyB0ZXh0LWFuY2hvcj0nbWlkZGxlJz5NPC90ZXh0Pjwvc3ZnPg=="/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="safety-shared.css"/>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="index.html"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back to dashboard</a>

  <div class="page-header">
    <div class="hdr-icon"><i class="ti ti-clock-hour-4" aria-hidden="true"></i></div>
    <div><div class="hdr-title">Contractor Hours</div><div class="hdr-sub" id="hdr-sub">Review submissions</div></div>
    <div class="session-bar">
      <div class="user-pill"><div class="u-avatar" id="hdr-avatar">—</div><span id="hdr-name">—</span><span class="role-badge" id="hdr-role">—</span></div>
      <div class="timer-pill" id="timer-pill"><i class="ti ti-clock" style="font-size:13px" aria-hidden="true"></i><span id="timer-txt">30:00</span></div>
      <button class="btn-sm danger" onclick="signOut()"><i class="ti ti-logout" style="font-size:13px" aria-hidden="true"></i> Sign out</button>
    </div>
  </div>

  <div class="expire-banner" id="expire"><i class="ti ti-alert-triangle" style="font-size:15px;flex-shrink:0" aria-hidden="true"></i><span>Session expiring soon.</span><button class="btn-sm" style="margin-left:auto" onclick="staySignedIn()">Stay signed in</button></div>

  <div class="card" style="padding:1rem 1.25rem">
    <div class="section-label"><i class="ti ti-filter" style="font-size:13px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>Filters</div>
    <div class="filter-grid">
      <select id="f-ct" onchange="applyFilters()"><option value="">All contractors</option></select>
      <select id="f-zone" onchange="applyFilters()"><option value="">All zones</option></select>
      <select id="f-month" onchange="applyFilters()"><option value="">All months</option></select>
      <input type="text" id="f-sup" placeholder="Search supervisor…" oninput="applyFilters()"/>
      <input type="date" id="f-from" oninput="applyFilters()"/>
      <input type="date" id="f-to" oninput="applyFilters()"/>
    </div>
  </div>

  <div id="adm-metrics" class="metrics" style="display:none">
    <div class="metric"><div class="metric-label">Total hours</div><div class="metric-value" id="m-total">—</div></div>
    <div class="metric"><div class="metric-label">Entries</div><div class="metric-value" id="m-entries">—</div></div>
    <div class="metric"><div class="metric-label">Contractors</div><div class="metric-value" id="m-cts">—</div></div>
    <div class="metric"><div class="metric-label">Zones active</div><div class="metric-value" id="m-zones">—</div></div>
  </div>

  <div style="display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:1rem">
    <button class="btn-sm" onclick="loadAdminData()"><i class="ti ti-refresh" style="font-size:13px" aria-hidden="true"></i> Refresh data</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('contractors')"><i class="ti ti-users" style="font-size:14px;vertical-align:-2px;margin-right:3px" aria-hidden="true"></i>By contractor</button>
    <button class="tab" onclick="switchTab('entries')"><i class="ti ti-list" style="font-size:14px;vertical-align:-2px;margin-right:3px" aria-hidden="true"></i>All entries</button>
  </div>

  <div id="view-contractors" class="view active">
    <div class="card"><div class="section-label">Hours per contractor</div><div id="adm-ct-list"><div class="empty"><i class="ti ti-users" aria-hidden="true"></i>Loading…</div></div></div>
  </div>

  <div id="view-entries" class="view">
    <div class="card" style="overflow-x:auto">
      <div class="section-label">All entries</div>
      <table class="entries-tbl">
        <thead><tr><th style="width:22%">Contractor</th><th style="width:22%">Zone</th><th style="width:22%">Work type</th><th style="width:16%">Date</th><th style="width:12%">Supervisor</th><th style="width:6%">Hrs</th></tr></thead>
        <tbody id="adm-entries-body"><tr><td colspan="6"><div class="empty"><i class="ti ti-table" aria-hidden="true"></i>Loading…</div></td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="safety-shell.js"></script>
<script>
// ── Contractor Hours — review logic ──
let allRecords = [], allContractors = {}, filteredRecords = [];

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  el('view-'+tab).classList.add('active');
}

async function loadAdminData(){
  try{
    const hoursData = await api('/api/hours?all=true');
    allContractors = {};
    allRecords = hoursData.records.map(r=>{
      const name = r.fields['Contractor Name'] || 'Unknown';
      const company = r.fields['Company'] || '';
      const key = name + '|' + company;
      if(!allContractors[key]) allContractors[key] = { id:key, name, company };
      return {
        id:r.id,
        contractor:{ id:key, name, company },
        zone:r.fields['Zone / Section'] || '',
        workType:r.fields['Work Type'] || '',
        supervisor:r.fields['Supervisor'] || '',
        date:r.fields['Date'] || '',
        month:r.fields['Month'] || '',
        hours:parseFloat(r.fields['Hours']) || 0
      };
    });
    populateFilters();
    applyFilters();
    el('adm-metrics').style.display = '';
    showToast('Data loaded — ' + allRecords.length + ' entries');
  }catch(e){ showToast(e.message || 'Failed to load', true); }
}

function populateFilters(){
  // Contractors
  const fCt = el('f-ct'); const existing = new Set([...fCt.options].map(o=>o.value));
  Object.values(allContractors).forEach(c=>{
    if(!existing.has(c.id)){
      const o=document.createElement('option');
      o.value=c.id; o.textContent=c.name+(c.company?' — '+c.company:'');
      fCt.appendChild(o);
    }
  });
  // Zones (derived from the records present)
  const fZone = el('f-zone'); const existingZ = new Set([...fZone.options].map(o=>o.value));
  [...new Set(allRecords.map(r=>r.zone).filter(Boolean))].sort().forEach(z=>{
    if(!existingZ.has(z)){ const o=document.createElement('option'); o.value=z; o.textContent=z; fZone.appendChild(o); }
  });
  // Months
  const months = new Set(allRecords.map(r=>r.date.slice(0,7)).filter(Boolean));
  const fM = el('f-month'); const existingM = new Set([...fM.options].map(o=>o.value));
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  [...months].sort().reverse().forEach(m=>{
    if(!existingM.has(m)){ const o=document.createElement('option'); o.value=m; const [y,mo]=m.split('-'); o.textContent=mn[parseInt(mo)-1]+' '+y; fM.appendChild(o); }
  });
}

function applyFilters(){
  const ctF=v('f-ct'), zoneF=v('f-zone'), monthF=v('f-month'), supF=v('f-sup').toLowerCase(), fromF=v('f-from'), toF=v('f-to');
  filteredRecords = allRecords.filter(r=>{
    if(ctF && r.contractor.id!==ctF) return false;
    if(zoneF && r.zone!==zoneF) return false;
    if(monthF && !r.date.startsWith(monthF)) return false;
    if(supF && !r.supervisor.toLowerCase().includes(supF)) return false;
    if(fromF && r.date<fromF) return false;
    if(toF && r.date>toF) return false;
    return true;
  });
  renderAll();
}

function renderAll(){
  const total = filteredRecords.reduce((s,r)=>s+r.hours,0);
  const ctSet = new Set(filteredRecords.map(r=>r.contractor.id));
  const zoneSet = new Set(filteredRecords.map(r=>r.zone).filter(Boolean));
  el('m-total').textContent=total.toFixed(1); el('m-entries').textContent=filteredRecords.length;
  el('m-cts').textContent=ctSet.size; el('m-zones').textContent=zoneSet.size;
  renderContractors(); renderEntries();
}

function renderContractors(){
  const listEl=el('adm-ct-list');
  if(!filteredRecords.length){ listEl.innerHTML='<div class="empty"><i class="ti ti-users"></i>No data for current filters</div>'; return; }
  const map={};
  filteredRecords.forEach(r=>{
    const k=r.contractor.id;
    if(!map[k]) map[k]={ ...r.contractor, hours:0, entries:0, months:{} };
    map[k].hours+=r.hours; map[k].entries++;
    if(r.month) map[k].months[r.month]=(map[k].months[r.month]||0)+r.hours;
  });
  const sorted=Object.values(map).sort((a,b)=>b.hours-a.hours);
  const max=sorted[0]?.hours||1;
  listEl.innerHTML=sorted.map(c=>{
    const ini=(c.name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const pct=Math.round((c.hours/max)*100);
    const monthList=Object.entries(c.months).sort((a,b)=>a[0].localeCompare(b[0])).map(([m,h])=>
      `<span style="font-size:11px;background:var(--soft);border:0.5px solid var(--line);border-radius:99px;padding:1px 7px;color:#555">${m}: ${h.toFixed(1)} hrs</span>`
    ).join(' ');
    return `<div class="ct-row">
      <div class="ct-av">${ini}</div>
      <div style="flex:1;min-width:0">
        <div class="ct-name">${c.name}</div>
        <div class="ct-meta">${c.company||'—'} · ${c.entries} entr${c.entries===1?'y':'ies'}</div>
        ${monthList?`<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">${monthList}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <div class="ct-hrs">${c.hours.toFixed(1)} hrs</div>
        <div class="ct-bar-wrap"><div class="ct-bar" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

function renderEntries(){
  const tbody=el('adm-entries-body');
  if(!filteredRecords.length){ tbody.innerHTML='<tr><td colspan="6"><div class="empty"><i class="ti ti-table"></i>No data</div></td></tr>'; return; }
  tbody.innerHTML=[...filteredRecords].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`<tr>
    <td title="${r.contractor.name}">${r.contractor.name}</td>
    <td><span class="badge badge-zone">${(r.zone.split('—')[0]||'').trim()}</span></td>
    <td><span class="badge badge-work" title="${r.workType}">${r.workType.length>14?r.workType.slice(0,13)+'…':r.workType}</span></td>
    <td>${r.date}</td>
    <td title="${r.supervisor}">${r.supervisor.length>10?r.supervisor.slice(0,9)+'…':r.supervisor}</td>
    <td>${r.hours.toFixed(1)}</td>
  </tr>`).join('');
}

// ── Boot ──
if (initShell({ subtitle: 'Review submissions', allow: s => s.role !== 'Contractor' })) {
  loadAdminData();
}
</script>
</body>
</html>
