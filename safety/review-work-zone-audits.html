<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Work Zone Audits — Review · MRDC Safety</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzMiAzMic+PHJlY3Qgd2lkdGg9JzMyJyBoZWlnaHQ9JzMyJyByeD0nNicgZmlsbD0nIzFCNEY4QScvPjx0ZXh0IHg9JzE2JyB5PScyMicgZm9udC1mYW1pbHk9J0dlb3JnaWEsc2VyaWYnIGZvbnQtc2l6ZT0nMTYnIGZvbnQtd2VpZ2h0PSdib2xkJyBmaWxsPScjRTg3NzJFJyB0ZXh0LWFuY2hvcj0nbWlkZGxlJz5NPC90ZXh0Pjwvc3ZnPg=="/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="safety-shared.css"/>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="index.html"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back to dashboard</a>

  <div class="page-header">
    <div class="hdr-icon icon-audit"><i class="ti ti-clipboard-check" aria-hidden="true"></i></div>
    <div><div class="hdr-title">Work Zone Audits</div><div class="hdr-sub" id="hdr-sub">Review submissions</div></div>
    <div class="session-bar">
      <div class="user-pill"><div class="u-avatar" id="hdr-avatar">—</div><span id="hdr-name">—</span><span class="role-badge" id="hdr-role">—</span></div>
      <div class="timer-pill" id="timer-pill"><i class="ti ti-clock" style="font-size:13px" aria-hidden="true"></i><span id="timer-txt">30:00</span></div>
      <button class="btn-sm danger" onclick="signOut()"><i class="ti ti-logout" style="font-size:13px" aria-hidden="true"></i> Sign out</button>
    </div>
  </div>

  <div class="expire-banner" id="expire"><i class="ti ti-alert-triangle" style="font-size:15px;flex-shrink:0" aria-hidden="true"></i><span>Session expiring soon.</span><button class="btn-sm" style="margin-left:auto" onclick="staySignedIn()">Stay signed in</button></div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
      <div class="section-label" style="margin-bottom:0">Submitted work zone audits</div>
      <button class="btn-sm" onclick="loadAudits()"><i class="ti ti-refresh" style="font-size:13px" aria-hidden="true"></i> Refresh</button>
    </div>
    <div id="audit-list"><div class="empty"><i class="ti ti-loader" aria-hidden="true"></i>Loading…</div></div>
  </div>

  <!-- Review panel (inline, hidden until a row is opened) -->
  <div id="audit-review-modal" style="display:none">
    <div class="card" style="border:2px solid var(--blue)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">
        <div class="section-label" style="margin-bottom:0" id="ar-title">Review audit</div>
        <button class="btn-sm" onclick="closeAuditReview()"><i class="ti ti-x" style="font-size:13px" aria-hidden="true"></i> Close</button>
      </div>
      <input type="hidden" id="ar-id"/>
      <div id="ar-details" style="font-size:13px;color:#333;background:#F4F7FB;border-radius:8px;padding:12px;margin-bottom:12px"></div>
      <div class="field" style="margin-bottom:0.75rem"><label>Review status</label>
        <select id="ar-status"><option>Open</option><option>Reviewed</option><option>Closed</option></select>
      </div>
      <div class="field" style="margin-bottom:0.5rem"><label>Safety review comment</label>
        <textarea id="ar-comment" rows="4" placeholder="Add a note for the auditor…"></textarea>
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#333;margin-bottom:0.75rem"><input type="checkbox" id="ar-email" style="width:auto"/> Email this note to the auditor</label>
      <div class="btn-row">
        <button class="btn" onclick="closeAuditReview()"><i class="ti ti-x" aria-hidden="true"></i> Cancel</button>
        <button class="btn btn-blue" id="ar-save" onclick="saveAuditReview()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Save review</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="safety-shell.js"></script>
<script>
// ── Work Zone Audits — review logic ──
let auditList = [];

function escAudit(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function auditStatusBadge(s){
  const m={'Open':'background:#FAF0DA;color:#8A5A00','Reviewed':'background:#EAF1F9;color:#143C6B','Closed':'background:#E3F3EC;color:#0F6E56'};
  return m[s]||m['Open'];
}
function auditRatingBadge(r){
  const m={'Compliant':'background:#E3F3EC;color:#0F6E56','Minor deficiencies':'background:#FAF0DA;color:#8A5A00','Major deficiencies':'background:#FCEEE1;color:#8A4A12','Stop work - critical':'background:#FBEBEB;color:#A32D2D'};
  return m[r]||'background:#EDF1F6;color:#5E6B80';
}

async function loadAudits(){
  const listEl=el('audit-list');
  listEl.innerHTML='<div class="empty"><i class="ti ti-loader" aria-hidden="true"></i>Loading…</div>';
  try{
    const data=await api('/api/audits');
    auditList=data.audits||[];
    renderAuditList();
  }catch(e){
    listEl.innerHTML=`<div class="empty"><i class="ti ti-alert-circle" aria-hidden="true"></i>${escAudit(e.message||'Could not load audits')}</div>`;
  }
}

function renderAuditList(){
  const listEl=el('audit-list');
  if(!auditList.length){ listEl.innerHTML='<div class="empty"><i class="ti ti-clipboard-off" aria-hidden="true"></i>No submitted audits yet</div>'; return; }
  listEl.innerHTML=auditList.map(a=>`
    <div class="list-row">
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500">${escAudit(a.auditId)||'(no id)'} ${a.rating?`<span class="badge" style="${auditRatingBadge(a.rating)}">${escAudit(a.rating)}</span>`:''}</div>
        <div style="font-size:12px;color:var(--muted)">${escAudit(a.date)||'—'} &middot; ${escAudit(a.contractor)||'—'} &middot; ${escAudit(a.location)||'—'} &middot; ${a.compliancePct!=null?a.compliancePct+'%':'—'}</div>
      </div>
      <span class="badge" style="${auditStatusBadge(a.status)}">${escAudit(a.status||'Open')}</span>
      <button class="btn-sm" onclick="openAuditReview('${a.id}')"><i class="ti ti-eye" style="font-size:13px"></i> Review</button>
    </div>
  `).join('');
}

function auditDetailsHtml(a){
  const kv=(k,val)=>`<div><span style="color:#888">${k}:</span> ${escAudit(val)||'—'}</div>`;
  let h='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px">';
  h+=kv('Auditor',a.auditor)+kv('Date',(a.date||'')+(a.time?' '+a.time:''));
  h+=kv('Contractor',a.contractor)+kv('Work order',a.workOrder);
  h+=kv('Location',a.location)+kv('Posted speed',a.speed!==''&&a.speed!=null?a.speed+' km/h':'');
  h+=kv('Compliance',a.compliancePct!=null?a.compliancePct+'%':'')+kv('Pass / Fail / N/A',`${a.pass} / ${a.fail} / ${a.na}`);
  h+='</div>';
  if(a.summaryNotes) h+=`<div style="margin-top:8px"><span style="color:#888">Summary:</span> ${escAudit(a.summaryNotes)}</div>`;
  const fails=(a.checklist||[]).filter(c=>c.status==='fail');
  if(fails.length){
    h+=`<div style="margin-top:8px;color:#A32D2D;font-weight:500">Deficiencies (${fails.length})</div><ul style="margin:4px 0 0;padding-left:18px">`;
    fails.forEach(c=>{ h+=`<li>${escAudit(c.text)}${c.note?` &mdash; <span style="color:#666">${escAudit(c.note)}</span>`:''}</li>`; });
    h+='</ul>';
  }
  if(a.photoUrls&&a.photoUrls.length){
    h+='<div style="margin-top:8px"><span style="color:#888">Photos:</span> '+a.photoUrls.map((u,i)=>`<a href="${encodeURI(u)}" target="_blank" rel="noopener" style="color:#1B4F8A">#${i+1}</a>`).join(' ')+'</div>';
  }
  if(a.reviewedBy||a.reviewedAt){
    h+=`<div style="margin-top:8px;color:#888;font-size:12px">Last reviewed by ${escAudit(a.reviewedBy)||'—'}${a.reviewedAt?' &middot; '+new Date(a.reviewedAt).toLocaleString():''}</div>`;
  }
  return h;
}

function openAuditReview(id){
  const a=auditList.find(x=>x.id===id); if(!a) return;
  el('ar-id').value=a.id;
  el('ar-title').textContent='Review — '+(a.auditId||'audit');
  el('ar-details').innerHTML=auditDetailsHtml(a);
  el('ar-status').value=(['Open','Reviewed','Closed'].includes(a.status)?a.status:'Open');
  el('ar-comment').value=a.safetyComments||'';
  const emailBox=el('ar-email'); emailBox.checked=!!a.auditorEmail; emailBox.disabled=!a.auditorEmail;
  el('audit-review-modal').style.display='';
  el('audit-review-modal').scrollIntoView({behavior:'smooth',block:'center'});
}

function closeAuditReview(){ el('audit-review-modal').style.display='none'; }

async function saveAuditReview(){
  const id=el('ar-id').value;
  const safetyComments=el('ar-comment').value.trim();
  const status=el('ar-status').value;
  const doEmail=el('ar-email').checked;
  const btn=el('ar-save'); const orig=btn.innerHTML; btn.disabled=true; btn.innerHTML='<i class="ti ti-loader"></i> Saving…';
  try{
    const data=await api('/api/audits',{method:'PATCH',body:JSON.stringify({ id, safetyComments, status, reviewedBy: session.name, emailAuditor: doEmail })});
    const idx=auditList.findIndex(x=>x.id===id);
    if(idx>-1 && data.audit) auditList[idx]=data.audit;
    renderAuditList();
    closeAuditReview();
    showToast(`Review saved${data.emailed?' · auditor emailed':''} ✓`);
  }catch(e){
    showToast(e.message||'Could not save review', true);
  }finally{
    btn.disabled=false; btn.innerHTML=orig;
  }
}

// ── Boot ──
if (initShell({ subtitle: 'Review submissions', allow: s => (s.appAccess||[]).includes('Audits') || s.role === 'Admin' })) {
  loadAudits();
}
</script>
</body>
</html>
